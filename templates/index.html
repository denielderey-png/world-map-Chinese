<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寰宇图鉴 · 互动世界地图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
  :root {
    --bg:       #08090f;
    --bg2:      #0d0f1a;
    --bg3:      #111420;
    --border:   rgba(255,255,255,0.06);
    --gold:     #c9a84c;
    --gold2:    #e8c96e;
    --text:     #e0d8c8;
    --text2:    rgba(224,216,200,0.5);
    --land:     #1e2535;
    --land-h:   #2a3550;
    --land-db:  #2e4060;
    --land-dbh: #3d5580;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── HEADER ─── */
  header {
    position: fixed; top: 0; left: 0; right: 0; height: 54px;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    background: rgba(8,9,15,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: baseline; gap: 12px; }
  .logo-main {
    font-size: 18px; font-weight: 700;
    letter-spacing: .18em; color: var(--gold);
  }
  .logo-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-style: italic;
    color: rgba(255,255,255,0.22); letter-spacing: .2em;
  }
  .header-hint { font-size: 11px; color: rgba(255,255,255,0.28); letter-spacing: .08em; }
  .header-hint b { color: var(--gold); font-weight: 600; }

  /* ─── STAGE ─── */
  #stage { position: fixed; top: 54px; left: 0; right: 0; bottom: 0; }
  #map-svg { width: 100%; height: 100%; display: block; cursor: grab; }
  #map-svg.dragging { cursor: grabbing; }

  /* ─── MAP ─── */
  .c-path {
    fill: var(--land);
    stroke: rgba(255,255,255,0.05); stroke-width: .4px;
    stroke-linejoin: round; cursor: pointer; transition: fill .2s;
  }
  .c-path:hover            { fill: var(--land-h); }
  .c-path.has-db           { fill: var(--land-db); }
  .c-path.has-db:hover     { fill: var(--land-dbh); }
  .c-path.active           { fill: var(--gold) !important; opacity: .85; }

  .c-label {
    font-family: 'Noto Serif SC', serif;
    text-anchor: middle; pointer-events: none;
    paint-order: stroke;
    stroke: rgba(8,9,15,.88); stroke-linejoin: round; stroke-width: 2.5px;
    fill: rgba(255,255,255,.38); font-size: 10px; user-select: none;
  }
  .c-label.has-db { fill: var(--gold2); font-size: 11px; font-weight: 700; }

  /* ─── TOOLTIP ─── */
  #tooltip {
    position: fixed;
    padding: 6px 13px;
    background: rgba(8,9,15,0.96);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--text); font-size: 12px; letter-spacing: .06em;
    pointer-events: none; z-index: 200;
    opacity: 0; transition: opacity .15s;
    white-space: nowrap; transform: translate(-50%, -115%);
  }
  #tooltip.show { opacity: 1; }
  .tip-badge {
    display: inline-block; margin-left: 8px; padding: 1px 5px;
    background: var(--gold); color: #000;
    font-size: 9px; font-weight: 700; letter-spacing: .1em; vertical-align: 1px;
  }

  /* ─── ZOOM BUTTONS ─── */
  .zoom-btns {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 3px; z-index: 50;
  }
  .z-btn {
    width: 36px; height: 36px;
    background: rgba(8,9,15,0.9);
    border: 1px solid var(--border);
    color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; font-family: sans-serif;
  }
  .z-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ─── LEGEND ─── */
  .legend {
    position: fixed; bottom: 24px; left: 24px;
    display: flex; flex-direction: column; gap: 7px; z-index: 50;
  }
  .legend-row {
    display: flex; align-items: center; gap: 9px;
    font-size: 11px; color: rgba(255,255,255,0.32); letter-spacing: .08em;
  }
  .legend-dot { width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0; }

  /* ─── PANEL ─── */
  #panel {
    position: fixed; top: 54px; right: 0;
    width: 380px; bottom: 0; z-index: 80;
    background: var(--bg2);
    border-left: 1px solid rgba(201,168,76,0.18);
    transform: translateX(100%);
    transition: transform .42s cubic-bezier(.16,1,.3,1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #panel.open { transform: translateX(0); }
  /* panelContent 把 panel 的 flex 流量传给内部的 p-hero+p-body */
  #panelContent {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-close {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px;
    background: transparent; border: 1px solid var(--border);
    color: rgba(255,255,255,0.4); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; transition: all .2s; font-family: sans-serif;
  }
  .panel-close:hover { border-color: var(--gold); color: var(--gold); }

  /* Hero image */
  .p-hero {
    position: relative; height: 260px; overflow: hidden;
    flex-shrink: 0; background: var(--bg3);
  }
  .p-hero img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: center 35%;  /* 偏上一点, 大多数地标主体在画面上半部 */
    display: block;
    position: relative; z-index: 2;
  }
  .p-hero-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
    opacity: 0;
    transition: opacity .3s;
  }
  .p-hero-svg svg { width: 100%; height: 100%; display: block; }
  .p-hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(13,15,26,.97) 0%,
      rgba(13,15,26,.12) 60%, transparent 100%);
    z-index: 3;
  }
  .p-hero-text { position: absolute; bottom: 18px; left: 22px; z-index: 4; }

  /* Pixabay 跳转按钮（用于无法直接嵌入的图片源） */
  .p-hero-link {
    position: absolute;
    bottom: 16px; right: 18px;
    z-index: 5;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    background: rgba(13, 15, 26, 0.78);
    border: 1px solid rgba(212, 175, 55, 0.55);
    border-radius: 6px;
    color: #d4af37;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.02em;
    backdrop-filter: blur(6px);
    transition: all .2s;
  }
  .p-hero-link:hover {
    background: rgba(212, 175, 55, 0.18);
    border-color: #d4af37;
    transform: translateY(-1px);
  }
  .p-hero-link::after {
    content: '↗';
    font-size: 13px;
    line-height: 1;
  }

  /* Header without image */
  .p-head {
    padding: 48px 22px 20px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }

  .p-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 700;
    color: #fff; line-height: 1; letter-spacing: .03em;
  }
  .p-id {
    font-size: 10px; color: var(--gold);
    letter-spacing: .35em; margin-top: 6px; font-weight: 600;
  }

  /* Body */
  .p-body {
    flex: 1 1 auto;
    min-height: 0;              /* flex 子项默认 min-height:auto 会撑爆父容器导致 overflow 失效 */
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;  /* iOS 流畅滚动 */
    padding-bottom: 40px;       /* 底部留空让最后一段不贴边 */
  }
  .p-body::-webkit-scrollbar { width: 6px; }
  .p-body::-webkit-scrollbar-track { background: transparent; }
  .p-body::-webkit-scrollbar-thumb { background: rgba(201,168,76,.4); border-radius: 3px; }
  .p-body::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,.7); }

  /* Info section */
  .p-section { padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .p-section-ttl {
    font-size: 9px; letter-spacing: .38em; color: var(--gold);
    font-weight: 700; margin-bottom: 14px; text-transform: uppercase;
  }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
  .info-lbl {
    font-size: 9px; color: rgba(255,255,255,.28);
    letter-spacing: .22em; margin-bottom: 4px; text-transform: uppercase;
  }
  .info-val { font-size: 13px; color: var(--text); line-height: 1.4; }
  .season-tag {
    display: inline-block; padding: 2px 9px;
    background: rgba(201,168,76,.1);
    border: 1px solid rgba(201,168,76,.25);
    color: var(--gold2); font-size: 11px;
  }

  /* Description */
  .p-desc-section { padding: 18px 22px; }
  .p-desc {
    font-size: 13px; line-height: 1.95;
    color: rgba(224,216,200,.78); text-align: justify;
  }
  .p-desc::first-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; float: left; line-height: .85;
    margin: 4px 5px 0 0; color: var(--gold); font-weight: 600;
  }

  /* Empty state */
  .p-empty { padding: 32px 22px; text-align: center; }
  .p-empty-icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 44px; color: rgba(255,255,255,.07); margin-bottom: 16px;
  }
  .p-empty-txt {
    font-size: 12px; color: rgba(255,255,255,.28);
    line-height: 1.9; letter-spacing: .05em;
  }
  .p-empty-txt code { color: var(--gold); font-size: 11px; }

  /* Loader */
  #loader {
    position: fixed; top: 54px; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; z-index: 60; background: var(--bg);
  }
  .spin {
    width: 38px; height: 38px;
    border: 2px solid rgba(201,168,76,.2);
    border-top-color: var(--gold);
    border-radius: 50%; animation: rot 1s linear infinite;
  }
  .loader-txt {
    font-size: 12px; color: rgba(255,255,255,.25); letter-spacing: .35em;
  }
  @keyframes rot { to { transform: rotate(360deg); } }

  /* ─── DETAIL BLOCKS ─── */
  .p-detail-blk {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
  }
  .p-detail-blk:last-child { border-bottom: none; }
  .p-detail-row {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 10px;
  }
  .p-detail-row:last-child { margin-bottom: 0; }
  .p-detail-icon {
    flex-shrink: 0;
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--gold); font-size: 13px;
    font-family: 'Cormorant Garamond', serif;
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 50%;
  }
  .p-detail-ttl {
    font-size: 10px; letter-spacing: .35em; color: var(--gold);
    font-weight: 700; text-transform: uppercase;
  }
  .p-detail-txt {
    margin-top: 6px; margin-left: 32px;
    font-size: 12.5px; line-height: 1.85;
    color: rgba(224,216,200,.78); text-align: justify;
  }
  .p-meta-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 11px 18px;
    margin-top: 6px; margin-left: 32px;
  }
  .p-meta-cell .info-lbl {
    font-size: 9px; color: rgba(255,255,255,.28);
    letter-spacing: .22em; margin-bottom: 3px;
  }
  .p-meta-cell .info-val { font-size: 12.5px; color: var(--text); line-height: 1.4; }

  /* ─── CITY MARKERS ─── */
  .city-dot {
    fill: var(--gold2);
    stroke: rgba(8,9,15,.95); stroke-width: 1.4px;
    cursor: pointer;
    transition: r .15s, fill .15s;
  }
  .city-dot:hover { fill: #fff; }
  .city-dot.cap-star { fill: var(--gold); }
  .city-label {
    font-family: 'Noto Serif SC', serif;
    text-anchor: middle; pointer-events: none;
    paint-order: stroke;
    stroke: rgba(8,9,15,.92); stroke-linejoin: round; stroke-width: 2.5px;
    fill: rgba(255,255,255,.88); font-size: 11px;
    font-weight: 500; user-select: none;
  }
  .city-label.is-cap { fill: var(--gold2); font-weight: 700; font-size: 12px; }
  .cities-layer { pointer-events: auto; }

  /* ─── MICRO-STATE MARKERS (微型国家) ─── */
  .micro-layer { pointer-events: auto; }
  .micro { transition: transform .2s; }
  .micro-halo { transition: r .2s, stroke .2s; }
  .micro:hover .micro-halo {
    stroke: var(--gold2) !important;
    stroke-width: 1.5px;
  }
  .micro:hover .micro-dot {
    fill: #fff !important;
  }
  .micro-label {
    font-family: 'Noto Serif SC', serif;
    font-size: 10px;
    fill: rgba(255,255,255,.5);
    paint-order: stroke;
    stroke: rgba(8,9,15,.9);
    stroke-linejoin: round;
    stroke-width: 2.5px;
    pointer-events: none;
    user-select: none;
    font-weight: 500;
  }
  .micro-label.has-db {
    fill: var(--gold2);
    font-weight: 700;
  }

  /* ─── RESET / RETURN BUTTON ─── */
  #zoomBack {
    position: fixed;
    top: 70px; left: 24px;
    z-index: 70;
    padding: 8px 16px;
    background: rgba(8,9,15,0.96);
    border: 1px solid var(--gold);
    color: var(--gold); font-size: 12px;
    letter-spacing: .18em;
    cursor: pointer;
    font-family: 'Noto Serif SC', serif;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity .25s, transform .25s, background .2s;
    pointer-events: none;
  }
  #zoomBack.show {
    opacity: 1; transform: translateY(0); pointer-events: auto;
  }
  #zoomBack:hover { background: var(--gold); color: #000; }
  #zoomBack::before {
    content: "‹ "; font-family: sans-serif; font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">寰宇图鉴</span>
    <span class="logo-sub">Atlas Mundi</span>
  </div>
  <div class="header-hint">
    点击<b>金色</b>国家查看详情并查看城市分布
  </div>
</header>

<div id="loader">
  <div class="spin"></div>
  <div class="loader-txt">正 在 绘 制 世 界</div>
</div>

<div id="stage">
  <svg id="map-svg"></svg>
</div>

<button id="zoomBack">返回全局</button>

<div id="tooltip"></div>

<div class="zoom-btns">
  <button class="z-btn" id="zIn">+</button>
  <button class="z-btn" id="zOut">−</button>
  <button class="z-btn" id="zRes" style="font-size:14px">⌖</button>
</div>

<div class="legend">
  <div class="legend-row">
    <div class="legend-dot" style="background:var(--land-db)"></div>
    <span>数据库已收录</span>
  </div>
  <div class="legend-row">
    <div class="legend-dot" style="background:var(--land)"></div>
    <span>暂无数据</span>
  </div>
</div>

<div id="panel">
  <button class="panel-close" id="panelClose">×</button>
  <div id="panelContent"></div>
</div>

/* ── STATE ── */
const S = { svg:null, g:null, zoom:null, path:null, feats:[], active:null };

function getISO(f) {
  return ISO_NUM[f.id] ||
    (f.properties.iso_a3 && f.properties.iso_a3 !== "-99"
      ? f.properties.iso_a3 : null) ||
    EN_ISO[f.properties.name || ""] || null;
}
function getCN(f) {
  return EN_CN[f.properties.name || ""] || f.properties.name || "";
}

/* ── INIT ── */
async function init() {
  try {
    const world = await fetch(
      "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json"
    ).then(r => r.json());
    const feats = topojson.feature(world, world.objects.countries).features;
    feats.forEach(f => { f.__iso = getISO(f); f.__cn = getCN(f); });
    S.feats = feats;
    document.getElementById("loader").style.display = "none";
    buildMap();
  } catch(e) {
    document.getElementById("loader").innerHTML =
      '<div style="font-size:13px;color:rgba(220,80,60,.7);letter-spacing:.1em">地图加载失败，请检查网络连接后刷新</div>';
  }
}

/* ── BUILD MAP ── */
function buildMap() {
  const stage = document.getElementById("stage");
  const W = stage.clientWidth, H = stage.clientHeight;
  const svg = d3.select("#map-svg");
  svg.attr("viewBox", `0 0 ${W} ${H}`).selectAll("*").remove();

  const defs = svg.append("defs");
  const og = defs.append("radialGradient")
    .attr("id","og").attr("cx","50%").attr("cy","50%").attr("r","70%");
  og.append("stop").attr("offset","0%").attr("stop-color","#111825");
  og.append("stop").attr("offset","100%").attr("stop-color","#080c14");
  svg.append("rect").attr("width",W).attr("height",H).attr("fill","url(#og)");

  const proj = d3.geoNaturalEarth1()
    .scale(W / 6.3).translate([W / 2, H / 2]);
  const path = d3.geoPath().projection(proj);
  S.path = path;

  const g = svg.append("g");

  g.append("path")
    .datum(d3.geoGraticule10())
    .attr("fill","none").attr("stroke","rgba(255,255,255,.025)")
    .attr("stroke-width",.5).attr("d", path);

  g.append("g")
    .selectAll("path.c-path")
    .data(S.feats).enter().append("path")
    .attr("class", d => "c-path" + (d.__iso && DB[d.__iso] ? " has-db" : ""))
    .attr("d", path)
    .attr("data-iso", d => d.__iso || "")
    .on("mouseenter", function(ev, d) {
      if (!d3.select(this).classed("active"))
        d3.select(this).classed("hov", true);
      showTip(ev, d);
    })
    .on("mousemove", moveTip)
    .on("mouseleave", function(ev, d) {
      d3.select(this).classed("hov", false);
      hideTip();
    })
    .on("click", (ev, d) => { ev.stopPropagation(); onClick(d); });

  g.append("g")
    .selectAll("text.c-label")
    .data(S.feats.filter(f => {
      const a = d3.geoArea(f);
      return a > 0.012 || (f.__iso && DB[f.__iso]);
    }))
    .enter().append("text")
    .attr("class", d => "c-label" + (d.__iso && DB[d.__iso] ? " has-db" : ""))
    .attr("transform", d => {
      const c = path.centroid(d);
      return `translate(${c[0]},${c[1]})`;
    })
    .text(d => d.__cn)
    .style("display", d => {
      const a = d3.geoArea(d);
      if (d.__iso && DB[d.__iso]) return null;
      return a > 0.04 ? null : "none";
    });

  /* ── 微型国家与岛国/海外属地专属标记层 ──
     50m 分辨率地图不包含微型国家/小岛国/海外属地的几何，
     用经纬度直接绘制金色光环标记，使它们也可被点击查看详情。 */

      showTip(ev, fake);
    })
    .on("mousemove", moveTip)
    .on("mouseleave", function() {
      d3.select(this).select(".micro-halo").attr("r", 9);
      hideTip();
    })
    .on("click", function(ev, d) {
      ev.stopPropagation();
      // 构造伪 feature 触发 onClick
      const fake = {
        __iso: d.iso, __cn: d.name,
        properties: { name: d.name },
        // 给 zoom 提供一个"边界"：以坐标为中心 ±3° 范围
        _microBounds: [
          proj([d.lng - 3, d.lat + 3]),
          proj([d.lng + 3, d.lat - 3])

      .attr("transform", function() {

         .style("font-size", (10 * inv) + "px");

  });

/* ── TOOLTIP ── */
function showTip(ev, f) {
  const t = document.getElementById("tooltip");
  const hasDB = f.__iso && DB[f.__iso];
  t.innerHTML = (f.__cn || "—") +
    (hasDB ? '<span class="tip-badge">已收录</span>' : "");
  t.classList.add("show");
  moveTip(ev);
}
function moveTip(ev) {
  const t = document.getElementById("tooltip");
  t.style.left = ev.clientX + "px";
  t.style.top  = ev.clientY + "px";
}
function hideTip() {
  document.getElementById("tooltip").classList.remove("show");
}

/* ── CLICK ── */
function onClick(f) {
  hideTip();
  S.g.selectAll(".c-path.active").classed("active", false);
  if (f.__iso)
    S.g.selectAll(`.c-path[data-iso="${f.__iso}"]`).classed("active", true);
  S.active = f;
  openPanel(f);

  // 如果国家在数据库中，缩放并加载城市
  const db = f.__iso ? DB[f.__iso] : null;
  if (db) {
    zoomToCountry(f);
    loadCities(db.id);
  } else {
    clearCities();
  }
}

/* ── ZOOM TO COUNTRY ── */
function zoomToCountry(f) {
  if (!S.svg || !S.path) return;
  const stage = document.getElementById("stage");
  const W = stage.clientWidth, H = stage.clientHeight;
  // 微型国家有预计算的 bounds（基于经纬度）
  const bounds = f._microBounds || S.path.bounds(f);
  const dx = bounds[1][0] - bounds[0][0];
  const dy = bounds[1][1] - bounds[0][1];
  if (!dx || !dy) return;
  const x = (bounds[0][0] + bounds[1][0]) / 2;
  const y = (bounds[0][1] + bounds[1][1]) / 2;
  // 留出右侧 380px 面板空间
  const usableW = W - 380;
  const scale = Math.min(8, 0.85 / Math.max(dx / usableW, dy / H));
  const tx = usableW / 2 - scale * x;
  const ty = H / 2 - scale * y;
  S.svg.transition().duration(800)
    .call(S.zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  document.getElementById("zoomBack").classList.add("show");
}

function zoomReset() {
  if (!S.svg) return;
  S.svg.transition().duration(600)
    .call(S.zoom.transform, d3.zoomIdentity);
  document.getElementById("zoomBack").classList.remove("show");
}

/* ── CITIES LAYER ── */
function clearCities() {
  if (S.g) S.g.selectAll(".cities-layer").remove();
}

async function loadCities(countryId) {
  clearCities();
  let cities = [];
  try {
    const r = await fetch(`/api/country/${countryId}/cities`);
    if (!r.ok) return;
    cities = await r.json();
  } catch(e) { return; }
  if (!cities.length) return;

  // 创建 projection（与 buildMap 中一致）
  const stage = document.getElementById("stage");
  const W = stage.clientWidth, H = stage.clientHeight;
  const proj = d3.geoNaturalEarth1()
    .scale(W / 6.3).translate([W / 2, H / 2]);

  const layer = S.g.append("g").attr("class", "cities-layer")
    .on("click", (ev) => ev.stopPropagation());
  const k = d3.zoomTransform(S.svg.node()).k || 1;

  cities.forEach(city => {
    const p = proj([city.longitude, city.latitude]);
    if (!p) return;
    const isCap = !!city.is_capital;
    const dotR = isCap ? 5.5 : 3.5;

    if (isCap) {
      // 首都：金色五角星
      const starPath = makeStarPath(p[0], p[1], 7, 3);
      layer.append("path")
        .attr("class", "city-dot cap-star")
        .attr("d", starPath)
        .attr("transform", `scale(${1/k})`)
        .attr("transform-origin", `${p[0]}px ${p[1]}px`)
        .style("transform-origin", `${p[0]}px ${p[1]}px`)
        .on("mouseenter", (ev) => showCityTip(ev, city))
        .on("mousemove", moveTip)
        .on("mouseleave", hideTip);
    } else {
      layer.append("circle")
        .attr("class", "city-dot")
        .attr("cx", p[0]).attr("cy", p[1])
        .attr("r", dotR / k)
        .on("mouseenter", (ev) => showCityTip(ev, city))
        .on("mousemove", moveTip)
        .on("mouseleave", hideTip);
    }

    layer.append("text")
      .attr("class", "city-label" + (isCap ? " is-cap" : ""))
      .attr("x", p[0]).attr("y", p[1] - (isCap ? 11 : 8) / k)
      .attr("transform", `scale(${1/k})`)
      .style("transform-origin", `${p[0]}px ${p[1]}px`)
      .text(city.name);
  });
}

function makeStarPath(cx, cy, rOut, rIn) {
  let d = "";
  for (let i = 0; i < 10; i++) {
    const ang = -Math.PI / 2 + i * Math.PI / 5;
    const r = i % 2 === 0 ? rOut : rIn;
    const x = cx + r * Math.cos(ang);
    const y = cy + r * Math.sin(ang);
    d += (i === 0 ? "M" : "L") + x.toFixed(2) + "," + y.toFixed(2);
  }
  return d + "Z";
}

function showCityTip(ev, city) {
  const t = document.getElementById("tooltip");
  const cap = city.is_capital
    ? '<span class="tip-badge">首都</span>' : "";
  t.innerHTML = city.name + cap +
    (city.description
      ? `<div style="font-size:10.5px;color:rgba(224,216,200,.55);margin-top:3px;letter-spacing:.02em;max-width:260px;white-space:normal">${city.description}</div>`
      : "");
  t.classList.add("show");
  moveTip(ev);
}

/* ── PANEL ── */
function openPanel(f) {
  const db = f.__iso ? DB[f.__iso] : null;
  document.getElementById("panelContent").innerHTML =
    db ? buildWithDB(db) : buildEmpty(f.__cn);
  document.getElementById("panel").classList.add("open");
}
function closePanel() {
  document.getElementById("panel").classList.remove("open");
  if (S.g) S.g.selectAll(".c-path.active").classed("active", false);
  S.active = null;
  clearCities();
  zoomReset();
}

function makeHeroSVG(name, capital, accent1, accent2, seed) {
  // 优先尝试国家专属地标插画
  if (LANDMARK_SVG[name]) {
    const landmark = LANDMARK_SVG[name](accent1, accent2);
    const safeCap = (capital || "").replace(/[<>&"']/g, "");
    return `<svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <defs>
        <linearGradient id="bg-${seed}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0a0d18"/>
          <stop offset="50%" stop-color="#15192a"/>
          <stop offset="100%" stop-color="#0d0f1a"/>
        </linearGradient>
        <radialGradient id="vig-${seed}" cx="50%" cy="50%" r="70%">
          <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
          <stop offset="100%" stop-color="rgba(8,9,15,.7)"/>
        </radialGradient>
      </defs>
      <rect width="400" height="200" fill="url(#bg-${seed})"/>
      ${landmark}
      <rect width="400" height="200" fill="url(#vig-${seed})"/>
    </svg>`;
  }

  // 基于种子生成确定性的伪随机数
  const rng = (n) => {
    let s = (seed * 9301 + 49297 + n * 233280) % 233280;
    return s / 233280;
  };

  // 选取一个东方意象图案模式（基于 seed）
  const mode = seed % 5;
  let pattern = "";

  if (mode === 0) {
    // 模式 0：远山叠嶂
    const layers = [];
    for (let i = 0; i < 4; i++) {
      const y = 100 + i * 28;
      const pts = [`M0,200 L0,${y}`];
      for (let x = 0; x <= 400; x += 30) {
        const h = 25 + rng(i * 10 + x) * 35 - i * 4;
        pts.push(`L${x},${y - h}`);
      }
      pts.push("L400,200 Z");
      const op = 0.18 + i * 0.12;
      layers.push(`<path d="${pts.join(" ")}" fill="${accent2}" opacity="${op}"/>`);
    }
    pattern = layers.join("");
  } else if (mode === 1) {
    // 模式 1：星空圆月
    const moonX = 80 + rng(1) * 240;
    const moonR = 32 + rng(2) * 18;
    const stars = [];
    for (let i = 0; i < 35; i++) {
      const sx = rng(i*3) * 400;
      const sy = rng(i*3+1) * 120;
      const sr = 0.6 + rng(i*3+2) * 1.4;
      stars.push(`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${sr.toFixed(2)}" fill="${accent1}" opacity="${(0.3 + rng(i*3+5) * 0.5).toFixed(2)}"/>`);
    }
    pattern = stars.join("") +
      `<circle cx="${moonX}" cy="60" r="${moonR}" fill="${accent1}" opacity=".55"/>` +
      `<circle cx="${moonX}" cy="60" r="${moonR}" fill="none" stroke="${accent1}" stroke-width="1" opacity=".8"/>`;
  } else if (mode === 2) {
    // 模式 2：日出海平面
    const sunX = 200, sunY = 130, sunR = 38;
    const rays = [];
    for (let i = 0; i < 12; i++) {
      const ang = (i / 12) * Math.PI - Math.PI;
      const x1 = sunX + Math.cos(ang) * (sunR + 5);
      const y1 = sunY + Math.sin(ang) * (sunR + 5);
      const x2 = sunX + Math.cos(ang) * (sunR + 25);
      const y2 = sunY + Math.sin(ang) * (sunR + 25);
      rays.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${accent1}" stroke-width="1.5" opacity=".5"/>`);
    }
    const waves = [];
    for (let i = 0; i < 5; i++) {
      const y = 145 + i * 12;
      waves.push(`<path d="M0,${y} Q100,${y-3} 200,${y} T400,${y}" fill="none" stroke="${accent1}" stroke-width="1" opacity="${0.5 - i * 0.08}"/>`);
    }
    pattern = rays.join("") +
      `<circle cx="${sunX}" cy="${sunY}" r="${sunR}" fill="${accent1}" opacity=".7"/>` +
      `<rect x="0" y="${sunY}" width="400" height="${200-sunY}" fill="${accent2}" opacity=".35"/>` +
      waves.join("");
  } else if (mode === 3) {
    // 模式 3：抽象建筑剪影
    const buildings = [];
    let x = 0;
    while (x < 400) {
      const w = 25 + rng(x) * 35;
      const h = 50 + rng(x + 0.5) * 110;
      buildings.push(`<rect x="${x.toFixed(1)}" y="${(200 - h).toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" fill="${accent2}" opacity=".5"/>`);
      // 窗户点点
      for (let wy = 200 - h + 10; wy < 195; wy += 12) {
        for (let wx = x + 5; wx < x + w - 5; wx += 9) {
          if (rng(wx + wy) > 0.55) {
            buildings.push(`<rect x="${wx.toFixed(1)}" y="${wy.toFixed(1)}" width="3" height="4" fill="${accent1}" opacity=".7"/>`);
          }
        }
      }
      x += w + 2;
    }
    pattern = buildings.join("");
  } else {
    // 模式 4：放射几何图腾
    const elems = [];
    const cx = 200, cy = 100;
    for (let i = 0; i < 8; i++) {
      const r = 18 + i * 11;
      elems.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${accent1}" stroke-width=".8" opacity="${(0.6 - i * 0.06).toFixed(2)}"/>`);
    }
    for (let i = 0; i < 16; i++) {
      const ang = (i / 16) * Math.PI * 2;
      const x2 = cx + Math.cos(ang) * 95;
      const y2 = cy + Math.sin(ang) * 95;
      elems.push(`<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${accent1}" stroke-width=".5" opacity=".25"/>`);
    }
    elems.push(`<circle cx="${cx}" cy="${cy}" r="6" fill="${accent1}"/>`);
    pattern = elems.join("");
  }

  // 取国家名首字符作为大字水印
  const firstChar = name.charAt(0);
  const safeCap = (capital || "").replace(/[<>&"']/g, "");

  return `<svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
      <linearGradient id="bg-${seed}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0a0d18"/>
        <stop offset="50%" stop-color="#15192a"/>
        <stop offset="100%" stop-color="#0d0f1a"/>
      </linearGradient>
      <radialGradient id="vig-${seed}" cx="50%" cy="50%" r="70%">
        <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
        <stop offset="100%" stop-color="rgba(8,9,15,.7)"/>
      </radialGradient>
    </defs>
    <rect width="400" height="200" fill="url(#bg-${seed})"/>
    ${pattern}
    <text x="200" y="125" font-family="'Cormorant Garamond', serif"
          font-size="120" font-weight="700" text-anchor="middle"
          fill="${accent1}" opacity=".08">${firstChar}</text>
    <rect width="400" height="200" fill="url(#vig-${seed})"/>
  </svg>`;
}

function buildWithDB(d) {
  // 为每个国家生成一个独特的金色配色（基于 id 哈希）
  const seed = d.id || 0;
  const hueShift = (seed * 37) % 60 - 30;  // -30 to +30
  const accent1 = `hsl(${42 + hueShift}, 65%, 56%)`;  // 金黄系
  const accent2 = `hsl(${30 + hueShift}, 50%, 32%)`;  // 深棕系

  // 图片处理：区分两种 image_url
  //   (1) CDN 图片直链 (images.unsplash.com / images.pexels.com / cdn.pixabay.com / 图片扩展名)
  //       → 直接 <img> 渲染, 失败兜底 SVG
  //   (2) Pixabay 页面链接 (pixabay.com/photos/ 等)
  //       → 显示 SVG 占位 + 右下角"在 Pixabay 查看"跳转按钮 (兜底, 现已用 Pexels 替代)
  const svgHero = makeHeroSVG(d.name, d.capital, accent1, accent2, seed);
  const safeId = String(d.id).padStart(3, "0");
  const url = (d.image_url || '').trim();
  const hasUrl = url.length > 0;
  // 判断是否是可直接嵌入的图片直链
  const isDirectImage = hasUrl && (
    url.includes('wsrv.nl') ||             // Cloudflare 图片代理（国内可访问）
    url.includes('images.unsplash.com') ||
    url.includes('images.pexels.com') ||
    url.includes('cdn.pixabay.com') ||
    /\.(jpg|jpeg|png|webp|gif|avif)(\?|$)/i.test(url)
  );
  // 判断是否是 Pixabay 页面链接(需要跳转)
  const isPixabayPage = hasUrl && !isDirectImage &&
    (url.includes('pixabay.com/photos/') || url.includes('pixabay.com/zh/photos/'));

  const imgTag = isDirectImage
    ? `<img src="${url}" alt="${d.name}" loading="lazy"
            onerror="this.style.display='none';this.parentNode.querySelector('.p-hero-svg').style.opacity='1';">`
    : '';
  const linkBtn = isPixabayPage
    ? `<a class="p-hero-link" href="${url}" target="_blank" rel="noopener noreferrer">在 Pixabay 查看原图</a>`
    : '';
  const svgOpacity = isDirectImage ? '0' : '1';
  const hero = `<div class="p-hero">
    ${imgTag}
    <div class="p-hero-svg" style="opacity:${svgOpacity}">${svgHero}</div>
    <div class="p-hero-grad"></div>
    <div class="p-hero-text">
      <div class="p-name">${d.name}</div>
      <div class="p-id">数据库编号 · ${safeId}</div>
    </div>
    ${linkBtn}
  </div>`;

  const cells = [
    ["首都", d.capital],
    ["官方语言", d.language],
    ["流通货币", d.currency],
    ["最佳旅行季节", d.best_season
      ? `<span class="season-tag">${d.best_season}</span>` : "—"]
  ].map(([l,v]) => `
    <div>
      <div class="info-lbl">${l}</div>
      <div class="info-val">${v}</div>
    </div>`).join("");

  // 详情字段构建器
  const detailBlock = (icon, ttl, txt) => txt
    ? `<div class="p-detail-blk">
         <div class="p-detail-row">
           <span class="p-detail-icon">${icon}</span>
           <span class="p-detail-ttl">${ttl}</span>
         </div>
         <div class="p-detail-txt">${txt}</div>
       </div>`
    : "";

  // 国情速览（小字段网格）
  const metaCells = [
    ["人口", d.population],
    ["面积", d.area],
    ["时区", d.timezone],
    ["主要宗教", d.religion],
  ].filter(([_,v]) => v && v.trim()).map(([l,v]) => `
    <div class="p-meta-cell">
      <div class="info-lbl">${l}</div>
      <div class="info-val">${v}</div>
    </div>`).join("");

  const metaBlock = metaCells
    ? `<div class="p-detail-blk">
         <div class="p-detail-row">
           <span class="p-detail-icon">i</span>
           <span class="p-detail-ttl">国情速览</span>
         </div>
         <div class="p-meta-row">${metaCells}</div>
       </div>`
    : "";

  return `${hero}
  <div class="p-body">
    <div class="p-section">
      <div class="p-section-ttl">基本信息</div>
      <div class="info-grid">${cells}</div>
    </div>
    <div class="p-desc-section">
      <div class="p-section-ttl">旅行简介</div>
      <div class="p-desc">${d.description}</div>
    </div>
    ${detailBlock("✦", "气候与四季", d.climate)}
    ${detailBlock("❀", "节日庆典", d.festivals)}
    ${detailBlock("◇", "著名景点", d.attractions)}
    ${detailBlock("⌘", "历史脉络", d.history)}
    ${detailBlock("☕", "特色美食", d.cuisine)}
    ${detailBlock("✺", "文化风俗", d.culture)}
    ${detailBlock("◉", "政治与对外关系", d.politics)}
    ${metaBlock}
  </div>`;
}

function buildEmpty(name) {
  // 给未收录国家也生成一个 SVG hero 以保持视觉一致
  const displayName = name || "未知";
  // 用名称哈希作种子保持稳定
  let seed = 0;
  for (let i = 0; i < displayName.length; i++) seed = (seed * 31 + displayName.charCodeAt(i)) & 0xffff;
  const hueShift = (seed * 37) % 60 - 30;
  const accent1 = `hsl(${42 + hueShift}, 35%, 45%)`;  // 暗淡金色（未收录国家）
  const accent2 = `hsl(${30 + hueShift}, 25%, 25%)`;
  const svgHero = makeHeroSVG(displayName, "", accent1, accent2, seed);

  return `<div class="p-hero">
    <div class="p-hero-svg" style="opacity:.55">${svgHero}</div>
    <div class="p-hero-grad"></div>
    <div class="p-hero-text">
      <div class="p-name" style="color:rgba(255,255,255,.85)">${displayName}</div>
      <div class="p-id" style="color:rgba(255,255,255,.3)">暂 未 收 录</div>
    </div>
  </div>
  <div class="p-body">
    <div class="p-empty">
      <div class="p-empty-icon">◈</div>
      <div class="p-empty-txt">
        <b style="color:rgba(224,216,200,.7);font-size:14px;letter-spacing:.05em">${displayName}</b><br><br>
        本图鉴目前收录 <b style="color:var(--gold)">${rawDB.length}</b> 个国家与地区的<br>
        详尽风物志（含气候、节庆、景点、<br>历史、美食、文化、城市等），<br>
        此国家暂未在收录范围内。<br><br>
        <span style="color:rgba(255,255,255,.25);font-size:11px;letter-spacing:.12em">
        请点击地图上的<span style="color:var(--gold)">金色国家</span>探索<br>
        或使用底部"+ − ⌖"按钮缩放浏览
        </span>
      </div>
    </div>
  </div>`;
}

/* ── KEYBOARD & RESIZE ── */
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePanel();
});
let rTimer;
window.addEventListener("resize", () => {
  clearTimeout(rTimer);
  rTimer = setTimeout(() => { if (S.feats.length) buildMap(); }, 200);
});

init();
</script>
</body>
</html>
